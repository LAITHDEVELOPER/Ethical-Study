  { text: "Cyberterrorism is:", options: ["The intimidation of a government or civilian population by using IT to disable critical infrastructure", "A type of virus", "A denial‑of‑service attack", "A phishing attempt"], correctText: "The intimidation of a government or civilian population by using IT to disable critical infrastructure" },

  { text: "The Digital Millennium Copyright Act (DMCA) implements:", options: ["The WIPO Copyright Treaty", "The GATT agreement", "The TRIPS agreement", "The PRO‑IP Act"], correctText: "The WIPO Copyright Treaty" },
  { text: "A patent is:", options: ["A grant of a property right issued by the USPTO to an inventor", "A type of copyright", "A trade secret", "A trademark"], correctText: "A grant of a property right issued by the USPTO to an inventor" },
  { text: "Which of the following cannot be patented?", options: ["Abstract ideas", "New machines", "New processes", "New compositions of matter"], correctText: "Abstract ideas" },
  { text: "Reverse engineering is:", options: ["The process of taking something apart to understand it, build a copy, or improve it", "The process of creating new software", "The process of encrypting data", "The process of backing up data"], correctText: "The process of taking something apart to understand it, build a copy, or improve it" },
  { text: "Open source code is:", options: ["Program whose source code is made available for use or modification", "Program with hidden source code", "Program that cannot be modified", "Program that is only free for a limited time"], correctText: "Program whose source code is made available for use or modification" },
  { text: "Competitive intelligence is:", options: ["Legally obtained information to help a company gain an advantage", "Illegal espionage", "A type of hacking", "A type of marketing"], correctText: "Legally obtained information to help a company gain an advantage" },
  { text: "Industrial espionage is:", options: ["Use of illegal means to obtain business information", "Legal competitive intelligence", "A type of patent", "A type of copyright"], correctText: "Use of illegal means to obtain business information" },
  { text: "A trademark is:", options: ["A logo, package design, phrase, sound, or word that differentiates a company's products", "A type of patent", "A type of copyright", "A trade secret"], correctText: "A logo, package design, phrase, sound, or word that differentiates a company's products" },
  { text: "Cybersquatting is:", options: ["Registering domain names for famous trademarks or company names to sell them for profit", "A type of hacking", "A type of virus", "A type of phishing"], correctText: "Registering domain names for famous trademarks or company names to sell them for profit" },
  { text: "ICANN is responsible for:", options: ["Managing the internet's domain name system", "Managing copyrights", "Managing patents", "Managing trade secrets"], correctText: "Managing the internet's domain name system" },
  { text: "The Anticybersquatting Consumer Protection Act allows:", options: ["Trademark owners to challenge foreign cybersquatters", "Anyone to register any domain", "Free domain registration", "Unlimited domain ownership"], correctText: "Trademark owners to challenge foreign cybersquatters" }
];

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

let shuffledQuestions = RAW_QUESTIONS.map(q => {
  const shuffledOpts = shuffleArray([...q.options]);
  return { text: q.text, optionsShuffled: shuffledOpts, correctAnswerText: q.correctText };
});

const total = shuffledQuestions.length;
let currentIdx = 0;
const questionTextEl = document.getElementById("questionText");
const optionsContainer = document.getElementById("optionsContainer");
const currentQSpan = document.getElementById("currentQNumber");
const totalQSpan = document.getElementById("totalQCount");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
totalQSpan.textContent = total;

function escapeHtml(str) {
  return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function renderCurrentQuestion() {
  const q = shuffledQuestions[currentIdx];
  questionTextEl.textContent = q.text;
  const letters = ['A', 'B', 'C', 'D'];
  let html = '';
  q.optionsShuffled.forEach((opt, idx) => {
    const letter = letters[idx];
    const isCorrect = (opt === q.correctAnswerText);
    const checkMark = isCorrect ? ' <span class="check-icon">✓</span>' : '';
    const extraClass = isCorrect ? 'correct-highlight' : '';
    html += `<div class="option-item ${extraClass}"><div class="option-letter">${letter}.</div><div class="option-text">${escapeHtml(opt)}${checkMark}</div></div>`;
  });
  optionsContainer.innerHTML = html;
  currentQSpan.textContent = currentIdx + 1;
  nextBtn.textContent = (currentIdx === total - 1) ? "🏁 Last" : "Next ▶";
}

function navigate(delta) {
  const newIdx = currentIdx + delta;
  if (newIdx >= 0 && newIdx < total) { currentIdx = newIdx; renderCurrentQuestion(); }
}
prevBtn.onclick = () => navigate(-1);
nextBtn.onclick = () => { if (currentIdx < total - 1) navigate(1); };
renderCurrentQuestion();
</script>
</body>
</html>
